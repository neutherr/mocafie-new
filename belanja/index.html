<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mocafie Link Navigator</title>
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg" />
    <link rel="icon" type="image/png" href="../assets/img/logopng.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2D5A27", // Mokafie Brand Green
              secondary: "#8B4513", // Mokafie Brand Brown
              "background-light": "#f6f8f6",
              "background-dark": "#102210",
              "mokafie-sand": "#F9F7F2",
              "mokafie-dark": "#1a2e1a",
              "shopee-orange": "#EE4D2D",
              "tokopedia-green": "#03AC0E",
              "tiktok-black": "#000000",
              "whatsapp-green": "#25D366",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            boxShadow: {
              soft: "0 10px 40px -10px rgba(0,0,0,0.08)",
              glow: "0 0 20px -5px rgba(45, 90, 39, 0.3)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark min-h-screen flex justify-center text-slate-800 dark:text-slate-100 selection:bg-primary selection:text-white"
  >
    <main
      class="w-full max-w-[430px] min-h-screen relative flex flex-col items-center px-6 py-12 mx-auto bg-mokafie-sand/50 dark:bg-background-dark"
    >
      <div
        class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-primary/10 to-transparent pointer-events-none z-0 opacity-60"
      ></div>
      <div
        class="absolute -top-24 -right-24 w-64 h-64 bg-primary/20 rounded-full blur-[80px] pointer-events-none z-0"
      ></div>

      <header
        class="relative z-10 flex flex-col items-center w-full mb-10 text-center animate-fade-in-up"
      >
        <div class="relative mb-4 group cursor-pointer">
          <div
            class="absolute inset-0 rounded-full bg-primary blur opacity-40 group-hover:opacity-60 transition-opacity duration-300"
          ></div>
          <div
            class="relative w-28 h-28 p-[3px] rounded-full bg-gradient-to-tr from-primary to-green-200"
          >
            <div
              class="w-full h-full rounded-full bg-white dark:bg-background-dark flex items-center justify-center overflow-hidden border-4 border-white dark:border-background-dark shadow-sm"
            >
              <!-- Updated Logo Source -->
              <img
                alt="Mocafie brand logo"
                class="w-full h-auto object-contain px-2"
                src="../assets/img/logopng.png"
              />
            </div>
          </div>
          <div
            class="absolute bottom-1 right-1 bg-white dark:bg-background-dark p-1 rounded-full shadow-sm"
          >
            <span
              class="material-symbols-outlined text-primary text-[20px] font-bold"
              >verified</span
            >
          </div>
        </div>
        <!-- Updated Brand Name -->
        <h1
          class="text-3xl font-serif font-bold tracking-tight text-slate-900 dark:text-white mb-1"
        >
          Mocafie
        </h1>
        <p
          class="text-sm font-medium text-slate-500 dark:text-slate-400 max-w-[280px] leading-relaxed"
        >
          Tepung Mocaf Berkualitas Tinggi.<br />Healthy living starts with
          better choices.
        </p>
      </header>

      <section class="w-full relative z-10 flex flex-col gap-4 mb-12">
        <!-- Shopee -->
        <a
          class="group relative w-full p-1 bg-white dark:bg-slate-800 rounded-full shadow-soft hover:shadow-glow hover:-translate-y-1 transition-all duration-300 ease-out"
          href="#"
        >
          <div class="flex items-center justify-between px-2 py-2">
            <div
              class="flex items-center justify-center w-10 h-10 rounded-full bg-orange-50 text-shopee-orange dark:bg-slate-700 dark:text-orange-400 group-hover:bg-shopee-orange group-hover:text-white transition-colors duration-300"
            >
              <span
                class="iconify text-2xl"
                data-icon="simple-icons:shopee"
              ></span>
            </div>
            <span
              class="flex-1 text-center font-bold text-slate-700 dark:text-slate-200 text-sm tracking-wide group-hover:text-primary transition-colors"
            >
              Beli di Shopee
            </span>
            <div
              class="w-10 h-10 flex items-center justify-center text-slate-300 group-hover:text-primary transition-colors"
            >
              <span class="material-symbols-outlined">north_east</span>
            </div>
          </div>
        </a>

        <!-- Tokopedia -->
        <a
          class="group relative w-full p-1 bg-white dark:bg-slate-800 rounded-full shadow-soft hover:shadow-glow hover:-translate-y-1 transition-all duration-300 ease-out"
          href="#"
        >
          <div class="flex items-center justify-between px-2 py-2">
            <div
              class="flex items-center justify-center w-10 h-10 rounded-full bg-green-50 text-tokopedia-green dark:bg-slate-700 dark:text-green-400 group-hover:bg-tokopedia-green group-hover:text-white transition-colors duration-300"
            >
              <img
                src="/assets/img/tokopedia.svg"
                alt="Tokopedia"
                class="w-6 h-6 object-contain"
              />
            </div>
            <span
              class="flex-1 text-center font-bold text-slate-700 dark:text-slate-200 text-sm tracking-wide group-hover:text-primary transition-colors"
            >
              Beli di Tokopedia
            </span>
            <div
              class="w-10 h-10 flex items-center justify-center text-slate-300 group-hover:text-primary transition-colors"
            >
              <span class="material-symbols-outlined">north_east</span>
            </div>
          </div>
        </a>

        <!-- TikTok Shop (Fixed Icon) -->
        <a
          class="group relative w-full p-1 bg-white dark:bg-slate-800 rounded-full shadow-soft hover:shadow-glow hover:-translate-y-1 transition-all duration-300 ease-out"
          href="#"
        >
          <div class="flex items-center justify-between px-2 py-2">
            <div
              class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 text-tiktok-black dark:bg-slate-700 dark:text-white group-hover:bg-black group-hover:text-white transition-colors duration-300"
            >
              <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                <path
                  d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"
                ></path>
              </svg>
            </div>
            <span
              class="flex-1 text-center font-bold text-slate-700 dark:text-slate-200 text-sm tracking-wide group-hover:text-primary transition-colors"
            >
              Order via TikTok Shop
            </span>
            <div
              class="w-10 h-10 flex items-center justify-center text-slate-300 group-hover:text-primary transition-colors"
            >
              <span class="material-symbols-outlined">north_east</span>
            </div>
          </div>
        </a>

        <!-- WhatsApp (Brand Color) -->
        <a
          class="group relative w-full p-1 bg-whatsapp-green rounded-full shadow-lg shadow-green-500/20 hover:shadow-green-500/40 hover:-translate-y-1 transition-all duration-300 ease-out overflow-hidden"
          href="https://wa.me/6285188789052"
          target="_blank"
        >
          <div
            class="absolute top-0 -left-[100%] w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent skew-x-12 group-hover:animate-[shimmer_1s_infinite]"
          ></div>
          <div class="flex items-center justify-between px-2 py-2">
            <div
              class="flex items-center justify-center w-10 h-10 rounded-full bg-white/20 text-white backdrop-blur-sm group-hover:bg-white group-hover:text-whatsapp-green transition-colors duration-300"
            >
              <span class="iconify text-xl" data-icon="mdi:whatsapp"></span>
            </div>
            <span
              class="flex-1 text-center font-bold text-white text-sm tracking-wide"
            >
              Chat Admin (WhatsApp)
            </span>
            <div
              class="w-10 h-10 flex items-center justify-center text-white/70 group-hover:text-white transition-colors"
            >
              <span class="material-symbols-outlined">chat</span>
            </div>
          </div>
        </a>
      </section>

      <div class="w-full flex items-center gap-4 mb-8 opacity-50">
        <div class="h-px bg-slate-300 dark:bg-slate-700 flex-1"></div>
        <span class="text-xs uppercase tracking-widest text-slate-400"
          >Follow Us</span
        >
        <div class="h-px bg-slate-300 dark:bg-slate-700 flex-1"></div>
      </div>

      <footer
        class="mt-auto flex flex-col items-center gap-6 relative z-10 w-full mb-8"
      >
        <div class="flex items-center gap-4">
          <!-- Instagram -->
          <a
            class="group flex items-center justify-center w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:border-primary hover:text-primary transition-all duration-300"
            href="https://www.instagram.com/mocafie.id/"
            target="_blank"
          >
            <span
              class="iconify text-xl text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors"
              data-icon="mdi:instagram"
            ></span>
          </a>
          <!-- Youtube -->
          <a
            class="group flex items-center justify-center w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:border-red-600 hover:text-red-600 transition-all duration-300"
            href="https://www.youtube.com/@mokafie"
            target="_blank"
          >
            <span
              class="iconify text-xl text-slate-600 dark:text-slate-300 group-hover:text-red-600 transition-colors"
              data-icon="mdi:youtube"
            ></span>
          </a>
          <!-- Facebook -->
          <a
            class="group flex items-center justify-center w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:border-blue-600 hover:text-blue-600 transition-all duration-300"
            href="https://www.facebook.com/profile.php?id=61587711460330"
            target="_blank"
          >
            <span
              class="iconify text-xl text-slate-600 dark:text-slate-300 group-hover:text-blue-600 transition-colors"
              data-icon="mdi:facebook"
            ></span>
          </a>
          <!-- Email -->
          <a
            class="group flex items-center justify-center w-12 h-12 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700 hover:border-primary hover:text-primary transition-all duration-300"
            href="mailto:hello@mocafie.com"
          >
            <span
              class="material-symbols-outlined text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors"
              >mail</span
            >
          </a>
        </div>
        <div class="text-center">
          <!-- Updated Footer Text -->
          <p
            class="text-[10px] text-slate-400 font-medium tracking-wide uppercase opacity-70"
          >
            Powered by Mocafie Link Navigator
          </p>
        </div>
      </footer>
    </main>
  </body>
</html>
